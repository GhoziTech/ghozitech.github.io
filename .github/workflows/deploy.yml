name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20.19.4'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify project files
        run: |
          test -f package.json
          test -f package-lock.json
          test -f vite.config.ts
          node --version
          npm --version

      - name: Install dependencies from public npm registry
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: 'false'
          NPM_CONFIG_REGISTRY: 'https://registry.npmjs.org/'
        run: npm ci --include=dev --no-audit --no-fund
        timeout-minutes: 10

      - name: Verify Vite installation
        run: |
          node -e "const v=require('./node_modules/vite/package.json').version; if(v!=='7.3.6') throw new Error('Unexpected Vite version: '+v); console.log('Vite',v,'OK')"
          node -e "const v=require('./node_modules/@vitejs/plugin-react/package.json').version; if(v!=='5.2.0') throw new Error('Unexpected plugin-react version: '+v); console.log('@vitejs/plugin-react',v,'OK')"

      - name: Build portfolio
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
